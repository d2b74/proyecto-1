name: P2P Scraper Automático

on:
  schedule:
    # 1. LUNES A VIERNES: Horario de mercado (13:00 a 22:00 UTC / 10:00 a 19:00 ARG)
    - cron: '*/10 13-22 * * 1-5'
    
    # 2. RESTO DEL TIEMPO: Cada 30 minutos (Todo lo que no sea el bloque anterior)
    - cron: '*/30 * * * *'
  
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Instalar dependencias
        run: pip install requests

      - name: Configurar Rclone
        run: |
          sudo apt-get install rclone
          mkdir -p ~/.config/rclone
          echo "${{ secrets.RCLONE_CONFIG }}" > ~/.config/rclone/rclone.conf

      - name: Ejecutar Scraper
        run: python recolector_p2p.py # Asegurate que tu archivo se llame main.py o cambialo acá
