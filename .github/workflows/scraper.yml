name: P2P Pipeline Completo

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

concurrency:
  group: pipeline-completo
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - run: pip install -r requirements.txt

      - name: Configurar Rclone
        run: |
          sudo apt-get install rclone -y
          mkdir -p ~/.config/rclone
          echo "${{ secrets.RCLONE_CONFIG }}" | base64 -d > ~/.config/rclone/rclone.conf

      - name: Restaurar caché de ml_engine
        uses: actions/cache@v3
        with:
          path: ml_engine
          key: ml-engine-${{ runner.os }}
          save-always: true

      - name: Crear carpetas necesarias
        run: mkdir -p ml_engine/USDT

      - name: Recuperar master.parquet si no está en caché
        run: |
          FILE="ml_engine/USDT/master.parquet"
          if [ ! -f "$FILE" ]; then
            echo "⚠️  Caché perdido. Recuperando master.parquet desde Drive..."
            rclone copy gdrive:p2p_datasets/USDT/master.parquet ./ml_engine/USDT/ \
              --checksum --verbose
            [ -f "$FILE" ] && echo "✅ Recuperado." || echo "ℹ️  No existe aún (primera corrida)."
          else
            echo "✅ master.parquet en caché ($(stat -c%s "$FILE") bytes)"
          fi

      - name: Descargar datos USDT desde Drive
        run: |
          rclone copy gdrive:p2p_datasets/USDT/ ./ml_engine/USDT/ \
            --checksum --verbose \
            --exclude "master.parquet" \
            --exclude "resultados_backtest.csv" \
            --exclude "reporte_backtest.txt"
        continue-on-error: true

      - name: Ejecutar Scraper
        run: python recolector_p2p.py
        env:
          DATA_ROOT: ${{ github.workspace }}/ml_engine

      - name: Ejecutar Manager
        run: python manager.py
        env:
          DATA_ROOT: ${{ github.workspace }}/ml_engine

      - name: Ejecutar Brain
        run: python brain.py
        env:
          DATA_ROOT: ${{ github.workspace }}/ml_engine

      - name: Subir archivos del pipeline a Drive
        run: |
          rclone copy ./ml_engine/USDT/ gdrive:p2p_datasets/USDT/ \
            --checksum --verbose \
            --exclude "master.parquet" \
            --exclude "resultados_backtest.csv" \
            --exclude "reporte_backtest.txt"
