name: P2P Scraper Automático

on:
  schedule:
    # 1. LUNES A VIERNES - Horario fuerte (10:00 a 19:00 ARG)
    - cron: '0,10,20,30,40,50 13-22 * * 1-5'
    
    # 2. LUNES A VIERNES - Madrugada (21:00 a 09:00 ARG)
    - cron: '0,30 0-12,23 * * 1-5'
    
    # 3. SÁBADOS
    - cron: '0,30 * * 6'
    
    # 4. DOMINGOS
    - cron: '0,30 * * 0'

  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Instalar dependencias
        run: pip install requests

      - name: Configurar Rclone
        run: |
          sudo apt-get install rclone
          mkdir -p ~/.config/rclone
          echo "${{ secrets.RCLONE_CONFIG }}" > ~/.config/rclone/rclone.conf

      - name: Ejecutar Scraper
        run: python recolector_p2p.py # Asegurate que tu archivo se llame main.py o cambialo acá
