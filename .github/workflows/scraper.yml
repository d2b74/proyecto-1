name: Pipeline P2P Completo

on:
  schedule:
    - cron: '*/5 * * * *'   # cada 5 minutos (con la precisión que GitHub permita)
  workflow_dispatch:        # permite ejecución manual

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Instalar dependencias
        run: pip install -r requirements.txt

      - name: Configurar Rclone
        run: |
          sudo apt-get install rclone
          mkdir -p ~/.config/rclone
          echo "${{ secrets.RCLONE_CONFIG }}" | base64 -d > ~/.config/rclone/rclone.conf

      - name: Crear carpeta local de trabajo
        run: mkdir -p ml_engine

      - name: Descargar datos existentes desde Drive
        run: |
          echo "📥 Descargando estructura actual desde Drive..."
          rclone copy gdrive:p2p_datasets/ ./ml_engine/ --verbose
        continue-on-error: true   # si es primera vez, no falla

      - name: Ejecutar Scraper
        run: python recolector_p2p.py
        env:
          DATA_ROOT: ${{ github.workspace }}/ml_engine

      - name: Ejecutar Manager (DataConsolidator)
        run: python manager.py
        env:
          DATA_ROOT: ${{ github.workspace }}/ml_engine

      - name: Ejecutar Micro
        run: python micro.py
        env:
          DATA_ROOT: ${{ github.workspace }}/ml_engine

      - name: Ejecutar Macro
        run: python macro.py
        env:
          DATA_ROOT: ${{ github.workspace }}/ml_engine

      - name: Ejecutar Brain (Orquestador)
        run: python brain.py
        env:
          DATA_ROOT: ${{ github.workspace }}/ml_engine

          
      - name: Verificar configuración de rclone
        run: |
          echo "Remotes configurados:"
          rclone listremotes
          echo "Probando acceso a gdrive:"
          rclone about gdrive: || echo "❌ No se pudo acceder a gdrive"
      
      - name: Listar archivos locales antes de subir
        run: |
          echo "Contenido de ml_engine/raw:"
          find ml_engine/raw -type f -name "*.parquet" | head -20
          echo "Total archivos Parquet en raw: $(find ml_engine/raw -name "*.parquet" | wc -l)"
          echo "Contenido de ml_engine/USDT:"
          ls -la ml_engine/USDT/ || echo "Carpeta USDT vacía o no existe"
          
      - name: Subir todo a Drive
        run: |
          echo "📤 Sincronizando cambios con Drive..."
          rclone sync ./ml_engine/ gdrive:p2p_datasets/ --verbose
