name: P2P Scraper Automático

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Instalar dependencias
        run: pip install -r requirements.txt

      - name: Configurar Rclone (Modo Base64)
        run: |
          sudo apt-get install rclone
          mkdir -p ~/.config/rclone
          echo "${{ secrets.RCLONE_CONFIG }}" | base64 -d > ~/.config/rclone/rclone.conf

      - name: Ejecutar Scraper
        run: python recolector_p2p.py

      - name: Subir archivos a Drive (estructura por meses)
        run: |
          DRIVE_BASE="gdrive:p2p_datasets/raw"
          # Buscar archivos en la carpeta raw (ajusta si tu scraper usa otra ruta)
          for file in $(find raw -name "p2p_*.parquet" 2>/dev/null); do
            rel_path="${file#raw/}"
            rclone mkdir "${DRIVE_BASE}/$(dirname "$rel_path")"
            rclone copy "$file" "${DRIVE_BASE}/$(dirname "$rel_path")/"
            echo "✅ Subido: $rel_path"
          done
          # Registro de ejecución
          echo "Última ejecución: $(date)" > ultimo_run.txt
          rclone copy ultimo_run.txt gdrive:p2p_datasets/
