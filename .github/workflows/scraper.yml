name: P2P Scraper Automático

on:
  schedule:
    - cron: '*/5 * * * *' # Corre cada 5 minutos exactos
  workflow_dispatch: # Botón para ejecutarlo a mano cuando quieras

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Instalar dependencias
        run: pip install requests

      - name: Configurar Rclone
        run: |
          sudo apt-get install rclone
          mkdir -p ~/.config/rclone
          echo "${{ secrets.RCLONE_CONFIG }}" > ~/.config/rclone/rclone.conf

      - name: Ejecutar Scraper
        run: python recolector_p2p.py # Asegurate que tu archivo se llame main.py o cambialo acá
