name: P2P Scraper Automático

on:
  schedule:
    - cron: '*/5 13-22 * * 1-5'
    - cron: '*/12 * * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Instalar dependencias
        run: pip install requests

      - name: Configurar Rclone (Modo Base64)
        run: |
          sudo apt-get install rclone
          mkdir -p ~/.config/rclone
          # Aquí decodificamos el secreto para que rclone lea el archivo original sin errores
          echo "${{ secrets.RCLONE_CONFIG }}" | base64 -d > ~/.config/rclone/rclone.conf

      - name: Ejecutar Scraper
        run: python recolector_p2p.py

      - name: Actualizar Drive (Unir datos)
        run: |
          NUEVO_DATA=$(ls p2p_raw_dataset_*.csv | head -n 1)
          
          # Intentamos bajar el historial. 
          # Si falla por error 429, el script se detendrá aquí gracias al 'set -e' por defecto de GitHub
          rclone copy gdrive:p2p_datasets/$NUEVO_DATA ./history.csv --drive-stop-on-upload-limit
          
          if [ -f "history.csv" ]; then
            echo "Historial recuperado con éxito. Uniendo..."
            tail -n +2 $NUEVO_DATA >> history.csv
            mv history.csv $NUEVO_DATA
          else
            # Si el archivo NO existe en el drive (mes nuevo), rclone no crea history.csv
            # Solo en ese caso permitimos que suba el archivo nuevo solo.
            echo "No se encontró historial previo. ¿Es un mes nuevo?"
          fi
          
          rclone copy $NUEVO_DATA gdrive:p2p_datasets/
          echo "🚀 Drive actualizado con éxito."
