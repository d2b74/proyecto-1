name: P2P Scraper Automático

on:
  schedule:
    - cron: '*/5 13-22 * * 1-5'
    - cron: '*/12 * * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Instalar dependencias
        run: pip install requests

      - name: Configurar Rclone (Modo Base64)
        run: |
          sudo apt-get install rclone
          mkdir -p ~/.config/rclone
          # Aquí decodificamos el secreto para que rclone lea el archivo original sin errores
          echo "${{ secrets.RCLONE_CONFIG }}" | base64 -d > ~/.config/rclone/rclone.conf

      - name: Ejecutar Scraper
        run: python recolector_p2p.py

      - name: Actualizar Drive (Append Directo)
        run: |
          # 1. Limpieza de posibles errores previos
          rm -rf old_history.csv
          
          # 2. Identificar el archivo nuevo generado hoy
          LOCAL_FILE=$(ls p2p_raw_dataset_*.csv | head -n 1)
          echo "Archivo local detectado: $LOCAL_FILE"

          # 3. Verificar si existe el archivo en Drive
          if rclone ls gdrive:p2p_datasets/$LOCAL_FILE; then
            echo "El historial existe en Drive. Uniendo..."
            # Forzamos que lo baje como archivo
            rclone copy gdrive:p2p_datasets/$LOCAL_FILE ./old_history.csv
            
            # Pegamos solo los datos (sin el encabezado) de LOCAL_FILE al historial
            tail -n +2 $LOCAL_FILE >> old_history.csv
            
            # Subimos el archivo final
            rclone copy old_history.csv gdrive:p2p_datasets/$LOCAL_FILE
          else
            echo "No hay historial. Subiendo archivo nuevo por primera vez."
            rclone copy $LOCAL_FILE gdrive:p2p_datasets/
          fi
          echo "🚀 Proceso terminado."
