name: P2P Scraper Automático

on:
  schedule:
    - cron: '*/5 13-22 * * 1-5'
    - cron: '*/12 * * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Instalar dependencias
        run: pip install requests

      - name: Configurar Rclone (Modo Base64)
        run: |
          sudo apt-get install rclone
          mkdir -p ~/.config/rclone
          # Aquí decodificamos el secreto para que rclone lea el archivo original sin errores
          echo "${{ secrets.RCLONE_CONFIG }}" | base64 -d > ~/.config/rclone/rclone.conf

      - name: Ejecutar Scraper
        run: python recolector_p2p.py

      - name: Actualizar Drive (Append Directo)
        run: |
          # 1. Definir nombres únicos para esta corrida
          TEMP_HISTORIAL="historial_${{ github.run_id }}.csv"
          
          # 2. Identificar el archivo nuevo generado hoy
          LOCAL_FILE=$(ls p2p_raw_dataset_*.csv | head -n 1)
          echo "Archivo local detectado: $LOCAL_FILE"

          # 3. Verificar si existe el archivo en Drive
          if rclone ls gdrive:p2p_datasets/$LOCAL_FILE; then
            echo "El historial existe en Drive. Bajándolo como $TEMP_HISTORIAL..."
            
            # Descargamos el archivo del Drive con el nuevo nombre único
            rclone copyto gdrive:p2p_datasets/$LOCAL_FILE ./$TEMP_HISTORIAL
            
            # Unimos los datos nuevos (saltando el encabezado) al historial
            tail -n +2 $LOCAL_FILE >> $TEMP_HISTORIAL
            
            # Subimos el archivo final volviendo al nombre original
            rclone copyto ./$TEMP_HISTORIAL gdrive:p2p_datasets/$LOCAL_FILE
          else
            echo "No hay historial. Subiendo por primera vez."
            rclone copy $LOCAL_FILE gdrive:p2p_datasets/
          fi
          
          echo "🚀 Proceso terminado con éxito."
