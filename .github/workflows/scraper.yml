name: P2P Scraper Automático

on:
  schedule:
    # 1. LUNES A VIERNES: Horario de mercado (13:00 a 22:00 UTC / 10:00 a 19:00 ARG)
    - cron: '*/10 13-22 * * 1-5'
    
    # 2. RESTO DEL TIEMPO: Cada 30 minutos
    - cron: '*/30 * * * *'
  
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Instalar dependencias
        run: pip install requests

      - name: Configurar Rclone (Modo Base64)
        run: |
          sudo apt-get install rclone
          mkdir -p ~/.config/rclone
          # Aquí decodificamos el secreto para que rclone lea el archivo original sin errores
          echo "${{ secrets.RCLONE_CONFIG }}" | base64 -d > ~/.config/rclone/rclone.conf

      - name: Ejecutar Scraper
        run: python recolector_p2p.py

      - name: Actualizar Drive (Unir datos)
        run: |
          FILE_NAME=$(ls p2p_raw_dataset_*.csv | head -n 1)
          echo "Archivo detectado: $FILE_NAME"
          
          # Intentar bajar el archivo actual del Drive
          rclone copy gdrive:p2p_datasets/$FILE_NAME ./ || true
          
          if [ -f "$FILE_NAME" ]; then
            # Verificamos si realmente existe en el drive comparando tamaños o existencia
            if rclone ls gdrive:p2p_datasets/$FILE_NAME; then
              echo "El archivo ya existe en Drive, uniendo datos..."
              mv $FILE_NAME local_new_data.csv
              rclone copy gdrive:p2p_datasets/$FILE_NAME ./
              cat local_new_data.csv >> $FILE_NAME
            else
              echo "Archivo nuevo para el mes, se subirá por primera vez."
            fi
          fi
          
          # Subir el archivo final actualizado
          rclone copy $FILE_NAME gdrive:p2p_datasets/
          echo "🚀 Drive actualizado con éxito."
