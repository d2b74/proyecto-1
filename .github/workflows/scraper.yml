name: P2P Scraper Automático

on:
  schedule:
    - cron: '*/5 13-22 * * 1-5'
    - cron: '*/12 * * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Instalar dependencias
        run: pip install requests

      - name: Configurar Rclone (Modo Base64)
        run: |
          sudo apt-get install rclone
          mkdir -p ~/.config/rclone
          # Aquí decodificamos el secreto para que rclone lea el archivo original sin errores
          echo "${{ secrets.RCLONE_CONFIG }}" | base64 -d > ~/.config/rclone/rclone.conf

      - name: Ejecutar Scraper
        run: python recolector_p2p.py

      - name: Actualizar Drive (Unir datos)
        run: |
          # 1. Identificar archivo generado por Python (datos nuevos)
          NUEVO_DATA=$(ls p2p_raw_dataset_*.csv | head -n 1)
          echo "Datos nuevos en: $NUEVO_DATA"
          
          # 2. Intentar bajar lo que ya está en Drive con otro nombre
          # Lo bajamos como 'history.csv' para que no choque con el nuevo
          rclone copy gdrive:p2p_datasets/$NUEVO_DATA ./history.csv || echo "Es un mes nuevo o archivo inexistente"
          
          if [ -f "history.csv" ]; then
            echo "Uniendo datos... el historial existe."
            # OPCIONAL: Verificamos que history.csv no sea un monstruo de 2GB por error
            TAMANO=$(stat -c%s "history.csv")
            if [ $TAMANO -gt 100000000 ]; then 
              echo "ERROR: El archivo de Drive es demasiado grande (>100MB). Algo anda mal."
              exit 1
            fi
            
            # Pegamos los datos NUEVOS al final del HISTORIAL
            # Usamos 'tail -n +2' para no repetir los encabezados (headers)
            tail -n +2 $NUEVO_DATA >> history.csv
            
            # Ahora el archivo final es history.csv, lo renombramos para subirlo
            mv history.csv $NUEVO_DATA
          else
            echo "Archivo nuevo para el mes, se subirá tal cual."
          fi
          
          # 3. Subir el archivo final actualizado (sobrescribe el del Drive)
          rclone copy $NUEVO_DATA gdrive:p2p_datasets/
          echo "🚀 Drive actualizado con éxito."
