name: Pipeline P2P Completo

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Instalar dependencias
        run: pip install -r requirements.txt

      - name: Configurar Rclone
        run: |
          sudo apt-get install rclone
          mkdir -p ~/.config/rclone
          echo "${{ secrets.RCLONE_CONFIG }}" | base64 -d > ~/.config/rclone/rclone.conf

      - name: Descargar datos desde Drive
        run: |
          rclone copy gdrive:p2p_datasets/ ./ --verbose
        continue-on-error: true

      - name: Ejecutar Scraper
        run: python recolector_p2p.py
        env:
          DATA_ROOT: ${{ github.workspace }}

      - name: Ejecutar Manager
        run: python manager.py
        env:
          DATA_ROOT: ${{ github.workspace }}

      - name: Ejecutar Micro
        run: python micro.py
        env:
          DATA_ROOT: ${{ github.workspace }}

      - name: Ejecutar Macro
        run: python macro.py
        env:
          DATA_ROOT: ${{ github.workspace }}

      - name: Ejecutar Brain
        run: python brain.py
        env:
          DATA_ROOT: ${{ github.workspace }}

      - name: Subir a Drive
        run: |
          rclone sync ./ gdrive:p2p_datasets/ --verbose --exclude ".git/**" --exclude ".github/**"
