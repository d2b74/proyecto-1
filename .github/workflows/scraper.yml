name: P2P Pipeline Completo

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Instalar dependencias
        run: pip install -r requirements.txt

      - name: Configurar Rclone
        run: |
          sudo apt-get install rclone
          mkdir -p ~/.config/rclone
          echo "${{ secrets.RCLONE_CONFIG }}" | base64 -d > ~/.config/rclone/rclone.conf

      - name: Crear carpeta de datos local
        run: mkdir -p ml_engine

      - name: Descargar datos existentes desde Drive
        run: |
          echo "📥 Descargando estructura actual desde Drive..."
          rclone copy gdrive:p2p_datasets/ ./ml_engine/ --verbose
        continue-on-error: true

      - name: Ejecutar Scraper
        run: python recolector_p2p.py
        env:
          DATA_ROOT: ${{ github.workspace }}/ml_engine

      - name: Ejecutar Manager (consolidación)
        run: python manager.py
        env:
          DATA_ROOT: ${{ github.workspace }}/ml_engine

      - name: Ejecutar Brain (orquestador)
        run: python brain.py
        env:
          DATA_ROOT: ${{ github.workspace }}/ml_engine

      - name: Subir todo a Drive
        run: |
          echo "📤 Sincronizando cambios con Drive..."
          rclone sync ./ml_engine/ gdrive:p2p_datasets/ --verbose
