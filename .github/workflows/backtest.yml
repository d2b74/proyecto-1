name: Backtest y Optimización Diaria

on:
  schedule:
    - cron: '0 3 * * *'   # 3:00 AM UTC = 00:00 ART
  workflow_dispatch:

concurrency:
  group: backtest-diario
  cancel-in-progress: false

jobs:
  backtest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - run: pip install -r requirements.txt

      - name: Configurar Rclone
        run: |
          sudo apt-get install rclone -y
          mkdir -p ~/.config/rclone
          echo "${{ secrets.RCLONE_CONFIG }}" | base64 -d > ~/.config/rclone/rclone.conf

      - name: Crear carpetas necesarias
        run: mkdir -p ml_engine/USDT ml_engine/contexto

      - name: Descargar signals.csv y best.json desde Drive
        run: |
          rclone copy gdrive:p2p_datasets/USDT/signals.csv ./ml_engine/USDT/ \
            --checksum --verbose
          # best.json se baja para que actualizar_best_json no pise datos previos
          rclone copy gdrive:p2p_datasets/USDT/best.json ./ml_engine/USDT/ \
            --checksum --verbose
        continue-on-error: true

      - name: Descargar contexto desde Drive
        run: |
          rclone copy gdrive:p2p_datasets/contexto/ ./ml_engine/contexto/ \
            --checksum --verbose
        continue-on-error: true

      - name: Ejecutar Backtest
        run: python backtest.py
        env:
          DATA_ROOT: ${{ github.workspace }}/ml_engine

      # Solo sube los archivos que genera el Backtest.
      - name: Verificar archivos generados
        run: |
          echo "📂 Archivos generados en ml_engine/USDT/:"
          ls -lh ml_engine/USDT/ || echo "  (carpeta vacía)"
          echo ""
          for archivo in \
            "ml_engine/USDT/resultados_backtest.csv" \
            "ml_engine/USDT/reporte_backtest.txt" \
            "ml_engine/USDT/best.json"; do
            if [ -f "$archivo" ]; then
              echo "  ✅ $archivo  ($(wc -l < $archivo) líneas)"
            else
              echo "  ❌ $archivo  — NO GENERADO"
            fi
          done

      - name: Subir resultados del Backtest a Drive
        run: |
          SUBIDOS=0
          for archivo in \
            "ml_engine/USDT/resultados_backtest.csv" \
            "ml_engine/USDT/reporte_backtest.txt" \
            "ml_engine/USDT/best.json"; do
            if [ -f "$archivo" ]; then
              rclone copy "$archivo" gdrive:p2p_datasets/USDT/ \
                --checksum --verbose
              echo "✅ Subido: $archivo"
              SUBIDOS=$((SUBIDOS + 1))
            else
              echo "⚠️  No encontrado: $archivo"
            fi
          done
          echo ""
          echo "📤 Total subidos: $SUBIDOS/3"
          if [ $SUBIDOS -eq 0 ]; then
            echo "❌ ERROR: no se subió ningún archivo — revisá los logs del backtest"
            exit 1
          fi
