name: Contexto Exterior

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - run: pip install -r requirements.txt
      - name: Configurar Rclone
        run: |
          sudo apt-get install rclone
          mkdir -p ~/.config/rclone
          echo "${{ secrets.RCLONE_CONFIG }}" | base64 -d > ~/.config/rclone/rclone.conf
      - name: Descargar contexto existente
        run: |
          mkdir -p ml_engine/contexto
          rclone copy gdrive:p2p_datasets/contexto/ ml_engine/contexto/ --verbose
        continue-on-error: true
      - name: Ejecutar script de contexto
        run: python contexto.py
        env:
          DATA_ROOT: ${{ github.workspace }}/ml_engine
      - name: Subir contexto a Drive (copy, nunca borra)
        run: rclone copy ml_engine/contexto/ gdrive:p2p_datasets/contexto/ --verbose
