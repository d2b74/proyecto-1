name: Contexto Exterior

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

concurrency:
  group: contexto-exterior
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - run: pip install -r requirements.txt

      - name: Configurar Rclone
        run: |
          sudo apt-get install rclone -y
          mkdir -p ~/.config/rclone
          echo "${{ secrets.RCLONE_CONFIG }}" | base64 -d > ~/.config/rclone/rclone.conf

      - name: Descargar contexto existente
        run: |
          mkdir -p ml_engine/contexto
          rclone copy gdrive:p2p_datasets/contexto/ ./ml_engine/contexto/ \
            --checksum --verbose
        continue-on-error: true

      - name: Snapshot pre-ejecución
        run: |
          FILE="ml_engine/contexto/contexto.csv"
          if [ -f "$FILE" ]; then
            echo "$(md5sum "$FILE" | cut -d' ' -f1)" > /tmp/ctx_pre_md5
            echo "$(wc -l < "$FILE")"                > /tmp/ctx_pre_lines
          else
            echo "none" > /tmp/ctx_pre_md5
            echo "0"    > /tmp/ctx_pre_lines
          fi
          echo "📋 Estado previo: $(cat /tmp/ctx_pre_lines) líneas"

      - name: Ejecutar script de contexto
        run: python contexto.py
        env:
          DATA_ROOT: ${{ github.workspace }}/ml_engine

      - name: Verificar que el archivo fue actualizado
        run: |
          FILE="ml_engine/contexto/contexto.csv"
          [ ! -f "$FILE" ] && echo "❌ contexto.csv no existe." && exit 1
          PRE=$(cat /tmp/ctx_pre_md5)
          POST=$(md5sum "$FILE" | cut -d' ' -f1)
          echo "📋 MD5 previo: $PRE | actual: $POST"
          [ "$POST" = "$PRE" ] && echo "❌ El archivo no cambió." && exit 1
          echo "✅ Actualizado. Líneas: $(wc -l < "$FILE")"

      # Sube contexto.csv
      - name: Subir contexto a Drive
        run: |
          rclone copy ./ml_engine/contexto/ gdrive:p2p_datasets/contexto/ \
            --checksum --verbose
      - name: Descargar master.parquet desde caché del Pipeline
        uses: actions/cache/restore@v3
        with:
          path: ml_engine
          key: ml-engine-${{ runner.os }}
        continue-on-error: true

      - name: Subir master.parquet a Drive (backup horario)
        run: |
          FILE="ml_engine/USDT/master.parquet"
          if [ -f "$FILE" ]; then
            SIZE=$(stat -c%s "$FILE")
            echo "📤 Subiendo master.parquet a Drive (${SIZE} bytes)..."
            rclone copy "$FILE" gdrive:p2p_datasets/USDT/ \
              --checksum --verbose
            echo "✅ master.parquet respaldado en Drive."
          else
            echo "⚠️  master.parquet no encontrado en caché. Se respaldará en la próxima hora."
          fi
