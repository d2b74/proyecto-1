name: Contexto Exterior

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - run: pip install -r requirements.txt

      - name: Configurar Rclone
        run: |
          sudo apt-get install rclone -y
          mkdir -p ~/.config/rclone
          echo "${{ secrets.RCLONE_CONFIG }}" | base64 -d > ~/.config/rclone/rclone.conf

      - name: Descargar contexto existente
        run: |
          mkdir -p ml_engine/contexto
          rclone copy gdrive:p2p_datasets/contexto/ ml_engine/contexto/ \
            --verbose \
            --checksum
        continue-on-error: true
        
      - name: Snapshot pre-ejecución
        run: |
          FILE="ml_engine/contexto/contexto.csv"
          if [ -f "$FILE" ]; then
            PRE_MD5=$(md5sum "$FILE" | cut -d' ' -f1)
            PRE_SIZE=$(stat -c%s "$FILE")
            PRE_LINES=$(wc -l < "$FILE")
          else
            PRE_MD5="none"
            PRE_SIZE=0
            PRE_LINES=0
          fi
          echo "$PRE_MD5"   > /tmp/ctx_pre_md5
          echo "$PRE_SIZE"  > /tmp/ctx_pre_size
          echo "$PRE_LINES" > /tmp/ctx_pre_lines
          echo "📋 Estado previo: ${PRE_LINES} líneas | ${PRE_SIZE} bytes | MD5: ${PRE_MD5}"

      - name: Ejecutar script de contexto
        run: python contexto.py
        env:
          DATA_ROOT: ${{ github.workspace }}/ml_engine

      - name: Verificar que el archivo fue actualizado
        run: |
          FILE="ml_engine/contexto/contexto.csv"

          if [ ! -f "$FILE" ]; then
            echo "❌ ERROR: contexto.csv no existe después de ejecutar el script."
            exit 1
          fi

          PRE_MD5=$(cat /tmp/ctx_pre_md5)
          PRE_SIZE=$(cat /tmp/ctx_pre_size)
          PRE_LINES=$(cat /tmp/ctx_pre_lines)

          POST_MD5=$(md5sum "$FILE" | cut -d' ' -f1)
          POST_SIZE=$(stat -c%s "$FILE")
          POST_LINES=$(wc -l < "$FILE")

          echo "📋 Estado previo: ${PRE_LINES} líneas | ${PRE_SIZE} bytes | MD5: ${PRE_MD5}"
          echo "📋 Estado actual: ${POST_LINES} líneas | ${POST_SIZE} bytes | MD5: ${POST_MD5}"

          if [ "$POST_MD5" = "$PRE_MD5" ]; then
            echo "❌ ERROR: El archivo no cambió (mismo MD5). El script no escribió datos nuevos."
            echo "   Revisá los logs del paso 'Ejecutar script de contexto' para el error real."
            exit 1
          fi

          LINEAS_NUEVAS=$((POST_LINES - PRE_LINES))
          echo "✅ Archivo actualizado correctamente. Líneas nuevas: ${LINEAS_NUEVAS}"

      - name: Subir contexto a Drive
        run: |
          rclone copy ml_engine/contexto/ gdrive:p2p_datasets/contexto/ \
            --verbose \
            --checksum

      - name: Verificar subida exitosa
        run: |
          echo "🔍 Verificando contenido en Drive..."
          rclone ls gdrive:p2p_datasets/contexto/ --verbose
          echo "✅ Verificación completa."
