name: Master Parquet Backup

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

concurrency:
  group: p2p-drive-access
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - run: pip install -r requirements.txt

      - name: Configurar Rclone
        run: |
          sudo apt-get install rclone -y
          mkdir -p ~/.config/rclone
          echo "${{ secrets.RCLONE_CONFIG }}" | base64 -d > ~/.config/rclone/rclone.conf

      - name: Crear carpetas necesarias
        run: mkdir -p ml_engine/USDT ml_engine/raw

      - name: Descargar master.parquet actual desde Drive
        run: |
          rclone copy gdrive:p2p_datasets/USDT/master.parquet ./ml_engine/USDT/ \
            --checksum --verbose
        continue-on-error: true

      - name: Descargar raw desde Drive
        run: |
          rclone copy gdrive:p2p_datasets/raw/ ./ml_engine/raw/ \
            --checksum --verbose
        continue-on-error: true

      - name: Snapshot pre-ejecución
        run: |
          FILE="ml_engine/USDT/master.parquet"
          if [ -f "$FILE" ]; then
            PRE_FILAS=$(python3 -c "import pandas as pd; df = pd.read_parquet('$FILE', columns=['timestamp']); print(len(df))" 2>/dev/null || echo "0")
          else
            PRE_FILAS=0
          fi
          echo "$PRE_FILAS" > /tmp/master_pre_filas
          echo "📋 Master previo: $PRE_FILAS filas"

      - name: Ejecutar Manager
        run: python manager.py
        env:
          DATA_ROOT: ${{ github.workspace }}/ml_engine

      - name: Verificar integridad y subir master.parquet
        run: |
          FILE="ml_engine/USDT/master.parquet"
          if [ ! -f "$FILE" ]; then
            echo "❌ master.parquet no existe después del manager."
            exit 1
          fi
          PRE_FILAS=$(cat /tmp/master_pre_filas)
          POST_FILAS=$(python3 -c "import pandas as pd; df = pd.read_parquet('$FILE', columns=['timestamp']); print(len(df))" 2>/dev/null || echo "0")
          echo "📋 Antes: $PRE_FILAS filas | Después: $POST_FILAS filas"
          if [ "$POST_FILAS" -lt "$PRE_FILAS" ]; then
            echo "🛑 ABORTADO: el master nuevo tiene MENOS filas. No se sube."
            exit 1
          fi
          if [ "$POST_FILAS" -eq "$PRE_FILAS" ]; then
            echo "ℹ️  Sin datos nuevos en raw, pero se sube para mantener Drive sincronizado."
          else
            echo "✅ Master creció $((POST_FILAS - PRE_FILAS)) filas."
          fi
          # Backup del master anterior antes de pisarlo
          rclone copy gdrive:p2p_datasets/USDT/master.parquet gdrive:p2p_datasets/USDT/backups/ \
            --backup-dir gdrive:p2p_datasets/USDT/backups \
            --suffix "_$(date +%Y%m%d_%H%M)" \
            --verbose || true

          rclone copy "$FILE" gdrive:p2p_datasets/USDT/ --checksum --verbose
          echo "✅ master.parquet subido a Drive."

      - name: Limpiar backups viejos (conservar últimos 3)
        run: |
          echo "🧹 Limpiando backups viejos..."
          # Lista todos los backups ordenados por fecha, borra los más viejos si hay más de 3
          rclone lsf gdrive:p2p_datasets/USDT/backups/ --format "tp" | \
            sort -r | \
            tail -n +4 | \
            awk '{print $2}' | \
            while read f; do
              rclone delete "gdrive:p2p_datasets/USDT/backups/$f" && echo "  🗑️  Borrado: $f"
            done
          echo "✅ Backups actuales:"
          rclone lsf gdrive:p2p_datasets/USDT/backups/ || echo "  (ninguno todavía)"
